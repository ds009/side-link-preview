<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Side Preview</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #fafafa;
      }
      .bar {
        display: flex;
        gap: 6px;
        padding: 6px 8px;
        border-bottom: 1px solid #e5e7eb;
        background: #fff;
        box-sizing: border-box;
        height: 40px;
      }
      .bar input {
        flex: 1;
        padding: 4px 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 12px;
        outline: none;
      }
      .bar input:focus {
        border-color: #3b82f6;
      }
      .bar button {
        border: 1px solid #d1d5db;
        background: #fff;
        border-radius: 6px;
        padding: 2px 10px;
        cursor: pointer;
        font-size: 12px;
        color: #374151;
      }
      .bar button:hover {
        background: #f3f4f6;
      }
      .frame-wrap {
        width: 100%;
        height: calc(100% - 40px);
        position: relative;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
      }
      .tip {
        position: absolute;
        inset: 0;
        padding: 24px;
        color: #6b7280;
        font-size: 13px;
        line-height: 1.6;
        background: #fff;
        display: none;
        box-sizing: border-box;
      }
      .tip.show {
        display: block;
      }
      .tip a {
        color: #3b82f6;
        text-decoration: none;
      }
      .empty {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #9ca3af;
        font-size: 13px;
        background: #fff;
      }
      .empty.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <input id="addr" type="text" placeholder="URL" spellcheck="false" />
      <button id="go" title="加载">Go</button>
      <button id="pop" title="在新标签页打开">↗</button>
    </div>
    <div class="frame-wrap">
      <iframe id="frame" referrerpolicy="no-referrer" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
      <div id="empty" class="empty">点击页面中任意 target="_blank" 链接即可在此预览</div>
      <div id="tip" class="tip">
        该网站可能禁止在 iframe 中嵌入（<code>X-Frame-Options</code> / <code>CSP</code>）。
        <br /><br />
        请点击右上角 <strong>↗</strong> 在新标签页打开。
      </div>
    </div>
    <script src="sidepanel.js"></script>
  </body>
</html>
