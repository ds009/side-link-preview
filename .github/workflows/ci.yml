name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Validate JSON
        run: npm run validate:json

      - name: Validate locales
        run: npm run validate:locales

      - name: Validate manifest excludes
        run: node scripts/validate-manifest-excludes.mjs

      - name: Build release zip
        run: npm run zip
