name: Package and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: meta
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Sanity check — tag must match manifest version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MF="${{ steps.meta.outputs.version }}"
          if [ "$TAG" != "$MF" ]; then
            echo "::error::Tag v$TAG does not match manifest version $MF"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Validate JSON
        run: npm run validate:json

      - name: Validate locales
        run: npm run validate:locales

      - name: Validate manifest excludes
        run: node scripts/validate-manifest-excludes.mjs

      - name: Build zip
        run: npm run zip

      - name: Read zip path
        id: zip
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "path=dist/side-link-preview-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: side-link-preview-${{ steps.meta.outputs.version }}
          path: ${{ steps.zip.outputs.path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.path }}
          draft: false
          prerelease: false
          generate_release_notes: true
